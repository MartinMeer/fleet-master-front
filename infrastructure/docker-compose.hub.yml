# Docker Compose configuration using images from DockerHub
# Update 'yourusername' with your actual DockerHub username

services:
  # Marketing site from DockerHub
  marketing-site:
    image: yourusername/fleetmaster-marketing:latest
    container_name: fleetmaster-marketing
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - fleetmaster-network

  # Main application from DockerHub
  main-app:
    image: yourusername/fleetmaster-main:latest
    container_name: fleetmaster-main
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - fleetmaster-network

  # Gateway/Load balancer
  gateway:
    image: nginx:alpine
    container_name: fleetmaster-gateway
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/ssl:ro  # For SSL certificates
    depends_on:
      marketing-site:
        condition: service_healthy
      main-app:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - fleetmaster-network

networks:
  fleetmaster-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

